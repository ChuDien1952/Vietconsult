<svg width="250" height="60" viewBox="0 0 250 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- VIET text in crimson red -->
  <g id="viet">
    <!-- V -->
    <path d="M 5 12 L 16 48 L 20 48 L 31 12 L 26 12 L 18 42 L 10 12 Z" fill="#DC143C"/>

    <!-- I -->
    <rect x="35" y="12" width="4" height="36" fill="#DC143C"/>

    <!-- E with 3 horizontal bars (special design) -->
    <g id="e-letter">
      <rect x="43" y="12" width="4" height="36" fill="#DC143C"/>
      <rect x="43" y="12" width="20" height="4" fill="#DC143C"/>
      <rect x="43" y="28" width="16" height="4" fill="#DC143C"/>
      <rect x="43" y="44" width="20" height="4" fill="#DC143C"/>
    </g>

    <!-- T -->
    <rect x="67" y="12" width="18" height="4" fill="#DC143C"/>
    <rect x="74" y="12" width="4" height="36" fill="#DC143C"/>
  </g>

  <!-- consult text in navy blue -->
  <text x="90" y="42" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="400" fill="#1E3A8A" letter-spacing="-0.5">consult</text>
</svg>